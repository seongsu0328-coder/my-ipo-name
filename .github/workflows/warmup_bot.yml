name: Streamlit App Warm-up Bot

on:
  schedule:
    # 1. 매일 아침 7시 30분 실행 (worker.py가 7시에 DB를 채운 직후 / KST 기준)
    # UTC 22:30 = KST 07:30
    - cron: '30 22 * * *'
    # 2. 서버 슬립 방지: 1시간마다 찔러주기
    - cron: '0 * * * *' 
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  ping-app:
    runs-on: ubuntu-latest
    steps:
    - name: 앱 접속 및 RAM 데이터 적재 (Tab 0, 1, 3, 4, 6 포함)
      run: |
        # -m 120: 최대 2분(120초) 동안 서버의 응답을 기다립니다. 
        # (전 종목 4개 국어 리포트를 RAM에 올리는 데 시간이 걸릴 수 있기 때문)
        curl -s -m 120 "https://my-ipo-name-production.up.railway.app/?warmup=true"
        echo "🚀 유니콘파인더 앱 워밍업 및 5대 핵심 데이터 RAM 적재 완료!"
