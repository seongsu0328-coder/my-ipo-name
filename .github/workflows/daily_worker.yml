name: UnicornFinder Daily Worker

on:
  # 코드가 저장(Push)될 때마다 즉시 실행
  push:
    branches: [ "main" ] 

  # 매일 한국 시간 오전 6시 실행 (UTC 21:00)
  schedule:
    # 💡 [핵심 수정] 하루 1번에서 -> 6시간마다(하루 4번) 실행으로 변경
    # (한국시간 기준 오전 3시, 9시, 오후 3시, 오후 9시 실행)
    - cron: '0 18,0,6,12 * * *'
  
  # 수동 실행 버튼 활성화
  workflow_dispatch:

jobs:
  run-worker:
    runs-on: ubuntu-latest
    
    steps:
      - name: 저장소 코드 체크아웃
        uses: actions/checkout@v3

      - name: 파이썬 3.11 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 필수 라이브러리 설치
        run: |
          # 💡 [수정] yfinance를 제거했습니다!
          pip install streamlit requests pandas numpy supabase google-generativeai

      - name: 데이터 수집기(Worker) 실행
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GENAI_API_KEY: ${{ secrets.GENAI_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          # 💡 [핵심 추가] FMP API 키를 Worker에 주입합니다!
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python worker.py
