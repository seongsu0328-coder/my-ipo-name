name: UnicornFinder Daily Worker

on:
  push:
    branches: [ "main" ] 
  schedule:
    - cron: '0 18,0,6,12 * * *'
  workflow_dispatch:

jobs:
  run-worker:
    runs-on: ubuntu-latest
    
    steps:
      # 💡 [수정] v4의 최신 노드 지원 버전을 사용하거나 v4를 유지
      - name: 저장소 코드 체크아웃
        uses: actions/checkout@v4

      # 💡 [핵심 수정] v4에서 v5로 변경 (Node.js 20 경고 해결)
      - name: 파이썬 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 필수 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 데이터 수집기(Worker) 실행
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GENAI_API_KEY: ${{ secrets.GENAI_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TWITTER_CONSUMER_KEY: ${{ secrets.TWITTER_CONSUMER_KEY }}
          TWITTER_CONSUMER_SECRET: ${{ secrets.TWITTER_CONSUMER_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          # 🚀 [추가] 이 줄이 있어야 파이썬이 구글 엔터프라이즈 AI를 쓸 수 있습니다!
          VERTEX_SA_JSON: ${{ secrets.VERTEX_SA_JSON }}
        run: python -u worker.py
