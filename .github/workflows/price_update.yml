name: 15-Min Price Updater

on:
  schedule:
    # 매 15분마다 실행 (0, 15, 30, 45분)
    - cron: '*/15 * * * *'
  
  workflow_dispatch: # 수동 실행 가능

jobs:
  update-price:
    runs-on: ubuntu-latest
    
    # 🚨 1. 환경변수를 위로 올리고, 파이썬 캐시 파일(.pyc) 생성 방지 옵션 추가
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      # 💡 [핵심 추가] FMP API 키를 드디어 주가 워커에 주입합니다!
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      PYTHONDONTWRITEBYTECODE: 1

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: 파이썬 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        # 🚨 2. 캐시 무시 + 최신 버전 강제 설치 (💡 yfinance 삭제 완료!)
        run: |
          pip install --no-cache-dir --upgrade pandas requests pytz

      - name: 주가 업데이트 실행
        # env는 위로 올렸으므로 여기서는 실행 명령어만 깔끔하게 남깁니다.
        run: python price_worker.py
